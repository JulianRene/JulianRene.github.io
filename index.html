<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teaching | Julian Rene</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(120deg, #c9e7ff 0%, #e0e5ec 100%);
      min-height: 100vh;
      position: relative;
    }
    .circuit-bg {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0;
      pointer-events: none;
      opacity: 0.25;
    }
    .teaching-card {
      position: relative;
      z-index: 1;
      background: #fff;
      max-width: 420px;
      margin: 80px auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border-radius: 24px;
      padding: 2em 2.5em;
      text-align: center;
    }
    .teaching-card h2 {
      margin-top: 0;
      font-size: 2.2em;
      color: #2779bd;
      letter-spacing: 2px;
    }
    .teaching-link {
      display: inline-block;
      margin-top: 1.5em;
      padding: 0.7em 1.5em;
      font-size: 1.2em;
      font-weight: 500;
      color: #fff;
      background: #2779bd;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 2px 4px 16px rgba(39, 121, 189, 0.15);
      transition: background 0.2s, transform 0.2s;
    }
    .teaching-link:hover {
      background: #145b9e;
      transform: scale(1.05);
    }
    @media(max-width: 600px) {
      .teaching-card {padding: 1.2em 1em;}
      .teaching-card h2 {font-size: 1.5em;}
      .teaching-link {font-size: 1em;}
    }
    .research-card {
      position: relative;
      z-index: 1;
      background: #fff;
      max-width: 420px;
      margin: 60px auto;
      box-shadow: 0 8px 32px rgba(0,0,0,0.1);
      border-radius: 24px;
      padding: 2em 2.5em;
      text-align: center;
    }
    .research-card h2 {
      margin-top: 0;
      font-size: 2.2em;
      color: #2779bd;
      letter-spacing: 2px;
    }
    .research-link {
      display: inline-block;
      margin-top: 1.5em;
      padding: 0.7em 1.5em;
      font-size: 1.2em;
      font-weight: 500;
      color: #fff;
      background: #2779bd;
      border-radius: 12px;
      text-decoration: none;
      box-shadow: 2px 4px 16px rgba(39, 121, 189, 0.15);
      transition: background 0.2s, transform 0.2s;
    }
    .research-link:hover {
      background: #145b9e;
      transform: scale(1.05);
    }

  </style>
</head>
<body>
  <svg class="circuit-bg" viewBox="0 0 900 600" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- Resistor symbol -->
    <rect x="350" y="150" width="200" height="20" rx="8" fill="#2779bd"/>
    <polyline points="350,160 335,170 365,170 385,150 415,170 435,150 455,170 475,150 495,170 515,150 535,170 550,160" fill="none" stroke="#145b9e" stroke-width="4"/>
    <!-- Voltage source symbol -->
    <circle cx="700" cy="400" r="32" fill="#fff" stroke="#2779bd" stroke-width="4"/>
    <line x1="700" y1="368" x2="700" y2="432" stroke="#2779bd" stroke-width="3"/>
    <line x1="684" y1="400" x2="716" y2="400" stroke="#2779bd" stroke-width="3"/>
    <!-- Simple circuit lines -->
    <line x1="120" y1="100" x2="350" y2="160" stroke="#2779bd" stroke-width="3"/>
    <line x1="550" y1="160" x2="700" y2="400" stroke="#2779bd" stroke-width="3"/>
    <line x1="700" y1="400" x2="830" y2="580" stroke="#2779bd" stroke-width="3"/>
  </svg>
  <div class="teaching-card">
    <h2>Teaching</h2>
    <a class="teaching-link" href="/ECE210/index.html">ECE-210 Circuit Analysis</a>
  </div>
  <div class="research-card">
    <h2>Research</h2>
    <a class="research-link" href="/RESEARCH/index.html">Projects - Publications</a>
  </div>
</body>
</html>
